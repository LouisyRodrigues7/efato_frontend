<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="ÉFato, plataforma de verificação e análise de informações políticas com IA."
  >

  <meta
    name="theme-color"
    content="#0F172A"
  >

  <meta
    name="color-scheme"
    content="dark light"
  >

  <title>
    ÉFato | Verificação Política com IA
  </title>

  <!-- CSS -->
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/sidebar.css">
  <link rel="stylesheet" href="./css/chat.css">
  <link rel="stylesheet" href="./css/input.css">
  <link rel="stylesheet" href="./css/cards.css">
  <link rel="stylesheet" href="./css/animation.css">
  <link rel="stylesheet" href="./css/themes.css">
  <link rel="stylesheet" href="./css/markdown.css">
  <link rel="stylesheet" href="./css/responsive.css">

  <!-- Favicon -->
  <link
    rel="icon"
    type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' font-weight='bold' fill='%2306B6D4'>É</text></svg>"
  >

</head>

<body>

  <div class="app-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <!-- Header -->
      <div class="sidebar-header">

        <div class="sidebar-logo">

          <div class="sidebar-logo-icon">
            É
          </div>

          <div class="sidebar-logo-info">

            <span class="sidebar-logo-title">
              ÉFato
            </span>

            <span class="sidebar-logo-subtitle">
              IA Política
            </span>

          </div>

        </div>

        <div class="sidebar-actions">

          <button
            type="button"
            class="sidebar-btn theme-toggle"
            aria-label="Alternar tema"
            title="Alternar tema"
          >
            🌙
          </button>

        </div>

      </div>

      <!-- Novo chat -->
      <button
        type="button"
        class="new-chat-btn"
        title="Nova conversa"
      >
        <span>
          + Nova Conversa
        </span>
      </button>

      <!-- Histórico -->
      <div
        class="chat-history"
        aria-label="Histórico de conversas"
      ></div>

      <!-- Footer -->
      <div class="sidebar-footer">

        <button
          type="button"
          class="sidebar-footer-btn"
          data-action="export-history"
          title="Exportar histórico"
        >

          <span class="sidebar-footer-btn-icon">
            📥
          </span>

          <span class="sidebar-footer-btn-text">
            Exportar
          </span>

        </button>

        <button
          type="button"
          class="sidebar-footer-btn"
          data-action="clear-all"
          title="Limpar histórico"
        >

          <span class="sidebar-footer-btn-icon">
            🗑️
          </span>

          <span class="sidebar-footer-btn-text">
            Limpar
          </span>

        </button>

      </div>

    </aside>

    <!-- Overlay mobile -->
    <div class="sidebar-overlay"></div>

    <!-- Botão mobile -->
    <button
      type="button"
      class="sidebar-toggle"
      aria-label="Abrir menu"
      title="Abrir menu"
    >
      ☰
    </button>

    <!-- MAIN -->
    <main class="main-content">

      <!-- Chat -->
      <section class="chat-container">

        <!-- Mensagens -->
        <div
          class="chat-messages"
          id="chatMessages"
        ></div>

        <!-- Disclaimer -->
        <div class="disclaimer">

          <p>
            ⚠️ O ÉFato pode gerar interpretações incorretas.
            Verifique sempre as fontes e dados apresentados.
          </p>

        </div>

      </section>

      <!-- INPUT -->
      <section class="input-area">

        <div class="input-wrapper">

          <textarea
            class="input-field"
            placeholder="Pergunte algo sobre política, economia ou notícias..."
            aria-label="Digite sua pergunta"
            rows="1"
            maxlength="5000"
            autocomplete="off"
            spellcheck="true"
          ></textarea>

          <div class="input-actions">

            <button
              type="button"
              class="btn-send"
              aria-label="Enviar mensagem"
              title="Enviar mensagem"
            >
              ➤
            </button>

          </div>

        </div>

      </section>

    </main>

  </div>

  <!-- JS -->
  <script
    type="module"
    src="./js/main.js"
  ></script>

</body>

</html>
